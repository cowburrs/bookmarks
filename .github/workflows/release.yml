name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix build .#packages.${{ matrix.system }}.default -L
      - name: Package binary
        run: |
          mkdir -p dist
          cp -L result/bin/* dist/
          tar -czf bm-${{ matrix.system }}.tar.gz -C dist .
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: bm-${{ matrix.system }}.tar.gz
